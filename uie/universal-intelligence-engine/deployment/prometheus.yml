# Prometheus Configuration for UIE

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'uie'
    environment: 'development'

scrape_configs:
  # UIE metrics
  - job_name: 'uie'
    static_configs:
      - targets: ['uie:8000']
        labels:
          service: 'universal-intelligence-engine'
    
    metrics_path: '/metrics'
    scrape_interval: 10s
  
  # OPA metrics
  - job_name: 'opa'
    static_configs:
      - targets: ['opa:8181']
        labels:
          service: 'open-policy-agent'
    
    metrics_path: '/metrics'
    scrape_interval: 30s
  
  # Redis metrics (requires redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
    
    scrape_interval: 30s

# Alerting rules (optional)
rule_files:
  # - 'alerts/*.yml'

# BUE Agent System Configuration
system:
  name: "BUE AI Agent System"
  version: "1.0.0"
  environment: "development"

agent:
  default_strategy: "enhanced"
  max_child_agents: 10
  child_timeout_seconds: 30

integration:
  udoa:
    endpoint: "http://udoa:8000"
  urpe:
    endpoint: "http://urpe:8001"
  governance:
    endpoint: "http://governance:8003"
    mode: "enforcing"
  ile:
    endpoint: "http://ile:8004"

manifests:
  directory: "./manifests"
  available:
    - saas.yaml
    - ai_ml.yaml
    - fintech.yaml
    - healthtech.yaml
    - cybersecurity.yaml

meta_learning:
  enabled: true
  confidence_threshold: 0.7

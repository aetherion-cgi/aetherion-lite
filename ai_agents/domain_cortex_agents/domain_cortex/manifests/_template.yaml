# Universal Domain Agent Manifest Template
# This template is instantiated for each of the 30 domains

domain_name: "DOMAIN_NAME_HERE"
domain_type: "industry" # or "technology"

# Domain description
description: |
  Brief description of this domain's scope and focus

# Domain ontology - key concepts and data models
ontology:
  entities:
    - name: "entity_1"
      attributes:
        - "attribute_1"
        - "attribute_2"
      relationships:
        - "related_entity"
  
  key_concepts:
    - "concept_1"
    - "concept_2"

# Domain-specific rules and constraints
rules:
  regulatory_constraints:
    - name: "regulation_1"
      description: "Description of regulatory requirement"
      compliance_level: "mandatory"
  
  business_rules:
    - name: "rule_1"
      description: "Business logic rule"
      priority: "high"
  
  risk_factors:
    - name: "risk_1"
      severity: "high"
      mitigation: "mitigation strategy"

# Key Performance Indicators
kpis:
  - name: "kpi_1"
    unit: "units"
    target: 100
  - name: "kpi_2"
    unit: "percentage"
    target: 95

# Common workflows
workflows:
  - name: "workflow_1"
    steps:
      - "step_1"
      - "step_2"
    expected_duration: "duration"

# Scenario templates for synthetic training
scenario_templates:
  - name: "scenario_1"
    description: "Description of training scenario"
    complexity: 5
    variables:
      - "var_1"
      - "var_2"

# Engine preferences - which Aetherion engines to use
engine_preferences:
  use_bue: true  # Business Underwriting Engine
  use_urpe: true  # Universal Risk & Probabilistic Engine
  use_udoa: true  # Universal Data Orchestration API
  use_ceoa: false  # Compute & Energy Orchestration API
  use_uie: true  # Universal Intelligence Engine
  use_ile: true  # Internal Learning Engine

# Related domains for cross-domain collaboration
related_domains:
  - "related_domain_1"
  - "related_domain_2"

# High complexity keywords
high_complexity_keywords:
  - "complex_keyword_1"
  - "complex_keyword_2"

# Query decomposition rules
decomposition_rules:
  - trigger: "trigger_phrase"
    sub_tasks:
      - "sub_task_1"
      - "sub_task_2"

# Domain-specific data sources
data_sources:
  internal:
    - "internal_source_1"
  external:
    - "external_api_1"
  public:
    - "public_dataset_1"

# Governance constraints
governance:
  sensitivity_level: "standard" # standard, elevated, critical
  authorization_tier: "tier_1" # tier_1, tier_2, tier_3
  data_retention_days: 365
  pii_handling: "mask" # mask, encrypt, pseudonymize

# Meta-learning configuration
meta_learning:
  enabled: true
  pattern_threshold: 10
  feedback_loop: true

# Child agent spawning configuration
child_agents:
  max_concurrent: 10
  default_timeout: 30
  specializations:
    - "specialization_1"
    - "specialization_2"

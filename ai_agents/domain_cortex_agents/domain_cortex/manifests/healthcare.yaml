domain_name: "Healthcare & Life Sciences"
domain_type: "industry"

description: |
  Pharmaceutical pipelines, hospital operations, biotech discovery,
  EMR compliance, patient care optimization, drug development,
  clinical trials, and healthcare delivery systems.

ontology:
  entities:
    - name: "Patient"
      attributes:
        - "demographics"
        - "medical_history"
        - "current_conditions"
      relationships:
        - "Provider"
        - "Insurance"
    
    - name: "Drug"
      attributes:
        - "compound_name"
        - "phase"
        - "efficacy"
        - "side_effects"
      relationships:
        - "Manufacturer"
        - "Clinical_Trial"
    
    - name: "Hospital"
      attributes:
        - "capacity"
        - "specializations"
        - "quality_metrics"
      relationships:
        - "Provider"
        - "Patient"
  
  key_concepts:
    - "PHI (Protected Health Information)"
    - "Clinical Efficacy"
    - "Drug Pipeline"
    - "Hospital Operations"
    - "EMR (Electronic Medical Records)"
    - "FDA Approval Process"
    - "Patient Outcomes"

rules:
  regulatory_constraints:
    - name: "HIPAA Compliance"
      description: "All PHI must be encrypted and access-controlled"
      compliance_level: "mandatory"
    
    - name: "FDA Regulation"
      description: "Drug development must follow FDA guidelines"
      compliance_level: "mandatory"
    
    - name: "Clinical Trial Ethics"
      description: "IRB approval required for human trials"
      compliance_level: "mandatory"
  
  business_rules:
    - name: "Patient Privacy"
      description: "Never expose identifiable patient data"
      priority: "critical"
    
    - name: "Drug Safety"
      description: "Safety takes precedence over speed-to-market"
      priority: "critical"
  
  risk_factors:
    - name: "Clinical Trial Failure"
      severity: "high"
      mitigation: "Multiple trial phases, adaptive design"
    
    - name: "Data Breach"
      severity: "critical"
      mitigation: "Encryption, access controls, audit trails"
    
    - name: "Adverse Drug Reactions"
      severity: "high"
      mitigation: "Pharmacovigilance, post-market surveillance"

kpis:
  - name: "Patient Satisfaction"
    unit: "score"
    target: 85
  - name: "Hospital Bed Utilization"
    unit: "percentage"
    target: 80
  - name: "Drug Success Rate"
    unit: "percentage"
    target: 15
  - name: "EMR Uptime"
    unit: "percentage"
    target: 99.9

workflows:
  - name: "Drug Development"
    steps:
      - "Discovery"
      - "Preclinical Testing"
      - "Phase I Trials"
      - "Phase II Trials"
      - "Phase III Trials"
      - "FDA Review"
      - "Approval"
    expected_duration: "10-15 years"
  
  - name: "Patient Care"
    steps:
      - "Intake"
      - "Diagnosis"
      - "Treatment Plan"
      - "Care Delivery"
      - "Follow-up"
    expected_duration: "varies"

scenario_templates:
  - name: "Pandemic Response"
    description: "Hospital system responding to infectious disease outbreak"
    complexity: 9
    variables:
      - "infection_rate"
      - "hospital_capacity"
      - "supply_chain"
      - "staff_availability"
  
  - name: "Drug Pipeline Analysis"
    description: "Pharmaceutical company drug portfolio optimization"
    complexity: 7
    variables:
      - "clinical_trial_results"
      - "market_size"
      - "competition"
      - "regulatory_timeline"

engine_preferences:
  use_bue: true
  use_urpe: true
  use_udoa: true
  use_ceoa: false
  use_uie: true
  use_ile: true

related_domains:
  - "Bioengineering Platforms"
  - "Data Platforms"
  - "AI/ML Systems"
  - "Cloud Computing"

high_complexity_keywords:
  - "clinical trial"
  - "drug development"
  - "pandemic"
  - "patient outcomes"
  - "FDA approval"
  - "EMR integration"

decomposition_rules:
  - trigger: "drug development"
    sub_tasks:
      - "Assess preclinical data"
      - "Model clinical trial design"
      - "Estimate regulatory timeline"
      - "Evaluate market opportunity"
  
  - trigger: "hospital operations"
    sub_tasks:
      - "Analyze bed utilization"
      - "Optimize staff scheduling"
      - "Evaluate supply chain"
      - "Assess patient flow"

data_sources:
  internal:
    - "EMR systems"
    - "Clinical trial databases"
  external:
    - "FDA drug database"
    - "ClinicalTrials.gov"
    - "PubMed"
  public:
    - "WHO health statistics"
    - "CDC data"

governance:
  sensitivity_level: "critical"
  authorization_tier: "tier_3"
  data_retention_days: 2555  # 7 years (HIPAA requirement)
  pii_handling: "encrypt"

meta_learning:
  enabled: true
  pattern_threshold: 15
  feedback_loop: true

child_agents:
  max_concurrent: 8
  default_timeout: 45
  specializations:
    - "Clinical Trial Analyst"
    - "Hospital Operations Expert"
    - "Drug Pipeline Evaluator"
    - "Patient Outcome Predictor"
    - "Regulatory Compliance Checker"

# Aetherion Domain Cortex Configuration

# Engine URLs (update with your deployment URLs)
engines:
  bue_url: "http://bue-engine:8000"
  urpe_url: "http://urpe-engine:8001"
  uie_url: "http://uie-engine:8002"
  udoa_url: "http://udoa-api:8003"
  ceoa_url: "http://ceoa-api:8004"
  ile_url: "http://ile-engine:8005"

# Domain Cortex Settings
domain_cortex:
  max_child_agents: 100
  default_timeout: 30
  enable_cross_domain: true
  enable_synthetic_training: true

# Synthetic Training Configuration
synthetic_training:
  default_complexity: 5
  company_count_multiplier: 10
  market_simulation_years: 10
  crisis_probability: 0.3

# Governance Settings
governance:
  enforce_governance: true
  default_authorization_tier: "tier_1"
  log_all_actions: true

# Performance Settings
performance:
  cache_manifests: true
  parallel_child_agents: true
  max_concurrent_queries: 50

# Logging
logging:
  level: "INFO"
  format: "json"
  output: "stdout"

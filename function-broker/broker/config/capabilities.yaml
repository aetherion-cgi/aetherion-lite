- id: "uie.query"
  display_name: "UIE Intelligence Query"
  description: "Public broker-safe intelligence query façade backed by protected internal synthesis"
  adapter: "DomainCortexAdapter"
  adapter_type: "http"
  endpoint: "http://127.0.0.1:7500/v1/synthesize"
  default_governance_tier: "T2"
  timeout_seconds: 30
  domains:
    - "general"
    - "orchestration"
  tags:
    category: "intelligence"
    priority: "standard"
    internal_backing: "domain_cortex"
    internal_only: "true"

